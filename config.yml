baseURL: "https://thomjiji.github.io/"
languageCode: "en-US"
title: "thomjiji"
theme: "PaperMod"
publishDir: "public"

DefaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageCode: en-US
    languageName: "English"
    contentDir: content/
    weight: 1
    taxonomies:
      categories: categories
      tag: tags
      # series: series
    params:
      titile: "thomjiji"
      cover:
        linkFullImages: true
      homeInfoParams:
        Title: Hello, I'm thomjiji
        Content: "This website is a mix of my blog, my learning journey, and what I'm up to recently ^^."
    menu:
      main:
        - name: About
          url: about/
          weight: 5
        - name: Blog
          url: posts/
          weight: 10
        - name: Search
          url: search/
          weight: 30
        - name: Categories
          url: categories/
          weight: 40
        - name: Tags
          url: tags/
          weight: 50

params:
  profileMode:
    enabled: false
    title: "thomjiji" # optional default will be site title
    subtitle: ""
    imageUrl: "" # optional
    imageTitle: "avator" # optional
    imageWidth: 120 # custom size
    imageHeight: 120 # custom size
    buttons:
      - name: Archives
        url: "/archives"
      - name: Tags
        url: "/tags"
      - name: GitHub
        url: "https://github.com/"

  socialIcons:
    - name: GitHub
      url: "https://github.com/thomjiji"
    - name: Bilibili
      url: "https://space.bilibili.com/14932681"
    - name: Mastodon
      url: "https://mastodon.social/@6ds1k"
    - name: X
      url: "https://x.com"

  defaultTheme: auto
  showShareButtons: false
  ShareButtons: ["twitter", "telegram", "reddit"]
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowReadingTime: false
  # editPost:
  #   URL: "https://github.com/thomjiji/thomjiji.github.io/tree/main/content/"
  #   Text: "Suggest Changes" # edit text
  #   appendFilePath: true # to append file path to Edit link

outputs:
  home:
    - HTML
    - RSS
    - JSON

assets:
  disableHLJS: true

markup:
  # goldmark:
  #   renderer:
  #     unsafe: true # allow raw HTML in markdown
  highlight:
     anchorLineNos: false
     codeFences: true
     guessSyntax: true
     hl_Lines: ""
     hl_inline: false
     lineAnchors: ""
     lineNoStart: 1
     lineNos: false
     lineNumbersInTable: true
     noClasses: false
     noHl: false
     style: doom-one
     tabWidth: 4

permalinks:
  posts: /blogs/:year/:month/:slug/

caches:
  images:
    dir: :resourceDir/images
