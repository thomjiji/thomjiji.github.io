<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/new.min.css">
  <link rel="stylesheet" href="/css/syntax.css">
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="alternate" type="application/rss+xml" href="/index.xml" title="{{ .Site.Title }}">
  {{ if .Params.math }}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}]})"></script>
  {{ end }}
</head>
<body>
  <header>
    <h1><a href="/">{{ .Site.Title }}</a><button id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"></button></h1>
    <nav>
      <a href="/">Home</a>
      <a href="/tags">Tags</a>
      <a href="/about">About</a>
      <a href="/index.xml">RSS</a>
    </nav>
  </header>
  <main>{{ block "main" . }}{{ end }}</main>
  <script>
    (function() {
      var saved = localStorage.getItem('theme');
      if (saved) document.documentElement.setAttribute('data-theme', saved);
      function updateLabel() {
        var t = document.documentElement.getAttribute('data-theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.getElementById('theme-toggle').textContent = dark ? '[ light ]' : '[ dark ]';
      }
      window.toggleTheme = function() {
        var t = document.documentElement.getAttribute('data-theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        var next = dark ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateLabel();
      };
      document.addEventListener('DOMContentLoaded', updateLabel);
    })();
  </script>
</body>
</html>
